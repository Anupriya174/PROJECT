<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Problem-Tracker</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>DSA Problem-Tracker</h1>
    <label for="problemName">Enter Your Problem Name:</label>
    <input type="text" id="problemName"  placeholder="Problem Name"><br>

    <label for="difficulty">Difficulty:</label>
    <select id="difficulty">
        <option value="Select Difficulty" selected disabled>Select Difficulty</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
    </select><br>
    <button id="addProblemBtn" onclick="addProblem()">Add Problem</button>

    <ul id="problemList"></ul>

    <script src="script.js"></script>
</body>
</html>
